name: SUDA Notice Check

on:
  push:
    paths:
      - '.github/workflows/suda-notice-check.yml'
      - 'scripts/suda_notice_check.py'
  schedule:
    - cron: '0 4,16 * * *'
  workflow_dispatch:

jobs:
  check-and-send:
    if: github.event_name != 'push' || contains(github.event.head_commit.message, '[send-test]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check notices and send email
        env:
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: 2418656381@qq.com
        run: python scripts/suda_notice_check.py
